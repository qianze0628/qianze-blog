server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:blog}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_password_here}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.qianze.entity
  configuration:
    map-underscore-to-camel-case: true

admin:
  password: ${ADMIN_PASSWORD:admin}

jwt:
  secret: ${JWT_SECRET:change-this-to-a-long-random-string}
  expiration: ${JWT_EXPIRATION:3600000}
